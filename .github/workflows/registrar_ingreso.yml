name: Registrar Ingreso DLW

on:
  schedule:
    # Horarios en UTC (Perú = UTC-5) — solo lunes a viernes (1-5)
    # 08:00 Lima → 13:00 UTC → 5 min antes para ventana ±5 min (sin restricción)
    - cron: '55 12 * * 1-5'
    # 13:00 Lima → 18:00 UTC → cron EXACTO: no puede ejecutarse antes de la 1pm
    - cron: '0 18 * * 1-5'
    # 14:00 Lima → 19:00 UTC → 5 min antes: no puede reingresar después de las 2pm
    - cron: '55 18 * * 1-5'
    # 20:00 Lima → 01:00 UTC → 5 min antes para ventana ±5 min (sin restricción)
    - cron: '55 0 * * 1-5'

  # Permite ejecutar manualmente desde la UI de GitHub
  workflow_dispatch:

jobs:
  registrar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Retraso aleatorio según restricciones horarias
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          if [ "$SCHEDULE" = "0 18 * * 1-5" ] || [ "$SCHEDULE" = "55 18 * * 1-5" ]; then
            sleep $((RANDOM % 301))
          else
            sleep $((RANDOM % 601))
          fi

      - name: Verificar feriado en Perú
        id: feriado
        run: |
          TODAY=$(TZ='America/Lima' date '+%Y-%m-%d')
          YEAR=$(TZ='America/Lima' date '+%Y')
          NOMBRE=$(curl -sf "https://date.nager.at/api/v3/PublicHolidays/${YEAR}/PE" \
            | jq -r ".[] | select(.date == \"${TODAY}\") | .localName" 2>/dev/null | head -1)
          if [ -n "$NOMBRE" ]; then
            echo "es_feriado=true"  >> $GITHUB_OUTPUT
            echo "nombre=$NOMBRE"   >> $GITHUB_OUTPUT
            echo "⛔ Hoy es feriado: $NOMBRE — se omite la marcación."
          else
            echo "es_feriado=false" >> $GITHUB_OUTPUT
            echo "nombre="          >> $GITHUB_OUTPUT
          fi

      - name: Determinar etiqueta del horario
        id: horario
        if: steps.feriado.outputs.es_feriado == 'false'
        run: |
          case "${{ github.event.schedule }}" in
            "55 12 * * 1-5") echo "label=08:00 — Ingreso mañana"      >> $GITHUB_OUTPUT ;;
            "0 18 * * 1-5")  echo "label=13:00 — Salida almuerzo"     >> $GITHUB_OUTPUT ;;
            "55 18 * * 1-5") echo "label=14:00 — Reingreso almuerzo"  >> $GITHUB_OUTPUT ;;
            "55 0 * * 1-5")  echo "label=20:00 — Salida tarde"        >> $GITHUB_OUTPUT ;;
            *)               echo "label=Manual"                       >> $GITHUB_OUTPUT ;;
          esac

      - name: Checkout del repositorio
        if: steps.feriado.outputs.es_feriado == 'false'
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        if: steps.feriado.outputs.es_feriado == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias Node
        if: steps.feriado.outputs.es_feriado == 'false'
        run: npm ci

      - name: Instalar Chromium (Playwright)
        if: steps.feriado.outputs.es_feriado == 'false'
        run: npx playwright install chromium --with-deps

      - name: Capturar hora de registro (Lima, UTC-5)
        id: timestamp
        if: steps.feriado.outputs.es_feriado == 'false'
        run: |
          HORA=$(TZ='America/Lima' date '+%d/%m/%Y %H:%M:%S')
          echo "hora=$HORA" >> $GITHUB_OUTPUT

      - name: Registrar ingreso
        id: registro
        if: steps.feriado.outputs.es_feriado == 'false'
        env:
          DNI: ${{ secrets.DNI }}
        run: |
          OUTPUT=$(node registrar_ingreso.js 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          {
            echo "salida<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Enviar correo de notificación
        if: steps.feriado.outputs.es_feriado == 'false' && always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: daniel.cabanillas@dlwlatam.com
          from: "Marcación DLW <${{ secrets.GMAIL_USER }}>"
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Marcación DLW — ${{ steps.horario.outputs.label }} — ${{ steps.timestamp.outputs.hora }}"
          content_type: text/html
          body: |
            <!DOCTYPE html>
            <html lang="es">
            <head><meta charset="UTF-8"></head>
            <body style="font-family:Arial,sans-serif;color:#333;max-width:520px;margin:auto;padding:16px">

              <p style="font-size:22px;font-weight:bold;color:${{ job.status == 'success' && '#2e7d32' || '#c62828' }};margin-bottom:20px">
                ${{ job.status == 'success' && '&#x2705; Marcaci&oacute;n registrada correctamente' || '&#x274C; Error al registrar la marcaci&oacute;n' }}
              </p>

              <table style="border-collapse:collapse;width:100%;max-width:500px">
                <tr style="background:#f5f5f5">
                  <td style="padding:10px 14px;font-weight:bold;width:45%">Hora de registro</td>
                  <td style="padding:10px 14px;font-size:16px;font-weight:bold">${{ steps.timestamp.outputs.hora }} (Lima)</td>
                </tr>
                <tr>
                  <td style="padding:10px 14px;font-weight:bold">Marcaci&oacute;n</td>
                  <td style="padding:10px 14px">${{ steps.horario.outputs.label }}</td>
                </tr>
                <tr style="background:#f5f5f5">
                  <td style="padding:10px 14px;font-weight:bold">Respuesta del sistema</td>
                  <td style="padding:10px 14px;font-family:monospace">${{ steps.registro.outputs.salida }}</td>
                </tr>
              </table>

              <p style="color:#aaa;font-size:11px;margin-top:24px;text-align:center">
                <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color:#aaa">Ver log en GitHub Actions</a>
              </p>

            </body>
            </html>
